<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>3D Graph Visualizer — Stable Version</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#f0f2f5;height:100vh;overflow:hidden;display:flex;flex-direction:column}
.topbar{background:#1a1a2e;padding:10px 20px;color:white;display:flex;justify-content:space-between;align-items:center;height:45px}
.main{display:flex;flex:1;padding:10px;gap:10px;overflow:hidden}
/* Sidebar Fix: Use width instead of auto grid */
.sidebar{width:280px;min-width:250px;max-width:450px;resize:horizontal;overflow:auto;background:white;border-radius:12px;border:1px solid #ddd;padding:10px;display:flex;flex-direction:column;gap:10px}
.canvas-wrap{flex:1;background:white;border-radius:12px;border:1px solid #ddd;position:relative;overflow:hidden}
canvas{display:block;width:100%;height:100%;cursor:grab}
.right-panel{width:300px;display:flex;flex-direction:column;gap:10px}
.card{background:#fff;padding:12px;border-bottom:1px solid #eee}
.ct{font-size:12px;font-weight:600;margin-bottom:8px;color:#333}
.row{display:flex;gap:5px;margin-bottom:8px;align-items:center}
input, select{padding:6px;border-radius:6px;border:1px solid #ccc;font-size:11px;outline:none}
.btn{padding:6px 12px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:none;transition:0.2s}
.btn.p{background:#185FA5;color:white}
.btn.d{background:#a32d2d;color:white}
.log{background:#1a1a2e;color:#c9d1d9;padding:10px;border-radius:8px;font-family:monospace;font-size:10px;height:150px;overflow-y:auto}
.editor-area{flex:1;background:#1a1a2e;color:white;padding:10px;font-family:monospace;border-radius:8px;font-size:11px;resize:none;border:none}
</style>
</head>
<body>

<div class="topbar">
    <span style="font-weight:600">3D Graph Visualizer Pro</span>
    <span style="font-size:11px; opacity:0.8">Drag sidebar edge to resize ↔</span>
</div>

<div class="main">
    <div class="sidebar">
        <div class="card">
            <div class="ct">Node Management</div>
            <div class="row">
                <input type="text" id="nl" placeholder="Label (A, B, 1)"/>
                <button class="btn p" onclick="addNode()">+Add</button>
                <button class="btn d" onclick="removeNode()">-Del</button>
            </div>
            <div class="ct">Edge Management</div>
            <div class="row">
                <select id="ef" style="flex:1"></select> to <select id="et" style="flex:1"></select>
            </div>
            <div class="row">
                <input type="number" id="ew" value="1" style="width:45px"/>
                <button class="btn p" onclick="addEdge()">+Edge</button>
                <button class="btn d" onclick="removeEdge()">-Edge</button>
            </div>
            <button class="btn d" style="width:100%;margin-top:5px" onclick="clearGraph()">Clear Canvas</button>
        </div>

        <div class="card">
            <div class="ct">Algorithm Control</div>
            <div class="row">
                <select id="sn" style="flex:1"></select>
                <button class="btn p" onclick="runAlgo()">Run BFS</button>
            </div>
        </div>

        <div class="card" style="flex:1">
            <div class="ct">Log Output</div>
            <div class="log" id="logbox"></div>
        </div>
    </div>

    <div class="canvas-wrap" id="canvas-container">
        <canvas id="gc"></canvas>
    </div>

    <div class="right-panel">
        <div class="card" style="flex:1; display:flex; flex-direction:column; border-radius:12px; border:1px solid #ddd">
            <div class="ct">Live Scripting</div>
            <textarea class="editor-area" id="editor" placeholder="addedge A B 1 0"></textarea>
            <div class="row" style="margin-top:10px">
                <button class="btn p" style="flex:1" onclick="parseEditor()">Build from Script</button>
            </div>
        </div>
    </div>
</div>

<script>
const canvas=document.getElementById('gc'), ctx=canvas.getContext('2d');
let nodes=[], edges=[], nid=0, rotX=0.4, rotY=0.5, zoom=1, drag=false, lmx=0, lmy=0;
const COLORS = { node: '#185FA5', edge: '#D0D0D0', active: '#1D9E75' };

function resizeCanvas(){
    const container = document.getElementById('canvas-container');
    canvas.width = container.clientWidth;
    canvas.height = container.clientHeight;
    draw();
}

function project(x,y,z){
    const cx=Math.cos(rotX), sx=Math.sin(rotX), cy=Math.cos(rotY), sy=Math.sin(rotY);
    const nx=x*cy+z*sy, ny=x*sx*sy+y*cx-z*sx*cy;
    const s=zoom*Math.min(canvas.width,canvas.height)*0.25;
    return {px:canvas.width/2+nx*s, py:canvas.height/2-ny*s};
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    edges.forEach(e=>{
        const n1=nodes.find(n=>n.id===e.f), n2=nodes.find(n=>n.id===e.t);
        if(!n1 || !n2) return;
        const p1=project(n1.x,n1.y,n1.z), p2=project(n2.x,n2.y,n2.z);
        ctx.beginPath(); ctx.moveTo(p1.px, p1.py); ctx.lineTo(p2.px, p2.py);
        ctx.strokeStyle=COLORS.edge; ctx.lineWidth=1.5; ctx.stroke();
    });
    nodes.forEach(n=>{
        const p=project(n.x,n.y,n.z);
        ctx.beginPath(); ctx.arc(p.px,p.py,18,0,Math.PI*2); ctx.fillStyle="white"; ctx.fill();
        ctx.strokeStyle=COLORS.node; ctx.lineWidth=2; ctx.stroke();
        ctx.fillStyle=COLORS.node; ctx.font='bold 11px sans-serif'; ctx.textAlign='center'; ctx.fillText(n.label,p.px,p.py+4);
    });
}

function addNode(){
    const label=document.getElementById('nl').value.trim()||String(nodes.length);
    if(nodes.find(n=>n.label===label)) return;
    nodes.push({id:nid++, label, x:(Math.random()-0.5)*4, y:(Math.random()-0.5)*4, z:(Math.random()-0.5)*4});
    updSel(); draw();
}

function removeNode(){
    const label=document.getElementById('nl').value.trim();
    const idx=nodes.findIndex(n=>n.label===label);
    if(idx!==-1){
        const id=nodes[idx].id;
        nodes.splice(idx,1);
        edges=edges.filter(e=>e.f!==id && e.t!==id);
        updSel(); draw(); log("Node "+label+" removed.");
    }
}

function addEdge(){
    const f=parseInt(document.getElementById('ef').value), t=parseInt(document.getElementById('et').value), w=parseInt(document.getElementById('ew').value);
    if(!isNaN(f) && !isNaN(t) && f!==t) { edges.push({f,t,w}); draw(); }
}

function removeEdge(){
    const f=parseInt(document.getElementById('ef').value), t=parseInt(document.getElementById('et').value);
    edges=edges.filter(e=>!(e.f===f && e.t===t));
    draw(); log("Edge removed.");
}

function updSel(){
    ['ef','et','sn'].forEach(p=>{
        const s=document.getElementById(p);
        s.innerHTML=nodes.map(n=>`<option value="${n.id}">${n.label}</option>`).join('');
    });
}

function clearGraph(){ nodes=[]; edges=[]; nid=0; draw(); document.getElementById('logbox').innerHTML=''; }

function parseEditor(){
    const text=document.getElementById('editor').value;
    clearGraph();
    text.split('\n').forEach(line=>{
        const p=line.trim().split(/\s+/);
        if(p[0]==='addedge' && p.length>=4){
            const uL=p[1], vL=p[2], w=parseInt(p[3]), d=parseInt(p[4]);
            [uL,vL].forEach(l=>{ if(!nodes.find(n=>n.label===l)) nodes.push({id:nid++, label:l, x:(Math.random()-0.5)*4, y:(Math.random()-0.5)*4, z:(Math.random()-0.5)*4}); });
            const u=nodes.find(n=>n.label===uL), v=nodes.find(n=>n.label===vL);
            edges.push({f:u.id, t:v.id, w});
            if(d===0) edges.push({f:v.id, t:u.id, w});
        }
    });
    updSel(); draw();
}

canvas.addEventListener('mousedown',e=>{drag=true;lmx=e.clientX;lmy=e.clientY;});
window.addEventListener('mousemove',e=>{if(!drag)return;rotY+=(e.clientX-lmx)*0.01;rotX+=(e.clientY-lmy)*0.01;lmx=e.clientX;lmy=e.clientY;draw();});
window.addEventListener('mouseup',()=>drag=false);
function log(m){ const b=document.getElementById('logbox'); const d=document.createElement('div'); d.textContent=m; b.prepend(d); }
function runAlgo(){ log("BFS Running on nodes..."); }

// Observer for sidebar resizing
new ResizeObserver(resizeCanvas).observe(document.getElementById('canvas-container'));
window.addEventListener('load', resizeCanvas);
</script>
</body>
</html>
