<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>3D Graph Visualizer — Algorithm Explorer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;color:#1a1a1a;height:100vh;overflow:hidden}
.topbar{background:#1a1a2e;padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:42px}
.logo-name{font-size:13px;font-weight:600;color:#fff}
.logo-sub{font-size:10px;color:#8b9ec7;border-left:1px solid #3a3a5c;padding-left:8px;margin-left:4px}
.tb-pill{font-size:10px;padding:2px 8px;border-radius:20px;border:1px solid #3a3a5c;color:#8b9ec7}
/* Sidebar resizeable logic */
.main{display:grid;grid-template-columns:auto 1fr 280px;gap:8px;padding:8px;height:calc(100vh - 42px)}
.sidebar{width:240px; min-width:200px; max-width:500px; display:flex; flex-direction:column; gap:7px; overflow-y:auto; overflow-x:hidden; resize:horizontal; background:#fff; border-radius:10px; border:1px solid #e5e5e5; padding:4px}
.card{background:#fff;border-bottom:1px solid #f0f0f0;border-radius:10px;padding:11px;flex-shrink:0}
.ct{font-size:11px;font-weight:600;color:#1a1a1a;margin-bottom:7px}
.sl{font-size:10px;color:#888;margin-bottom:3px;font-weight:500}
.row{display:flex;gap:4px;margin-bottom:5px;align-items:center}
input[type=text],input[type=number]{padding:4px 6px;border:1px solid #e0e0e0;border-radius:5px;font-size:11px;background:#fff;color:#1a1a1a;outline:none; width: 100%}
input[type=number]{width:50px}
.btn{padding:4px 9px;border-radius:5px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid #e0e0e0;background:#fff;color:#1a1a1a;transition:all 0.15s;white-space:nowrap}
.btn:hover{background:#f5f5f7}
.btn.p{background:#185FA5;color:#fff;border-color:#185FA5}
.btn.d{background:#a32d2d;color:#fff;border-color:#a32d2d}
.btn.sm{padding:3px 7px;font-size:10px}
.algo-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px}
.ab{padding:5px 4px;border-radius:5px;font-size:10px;font-weight:500;cursor:pointer;border:1px solid #e0e0e0;background:#fff;text-align:center}
.ab.active{background:#185FA5;color:#fff}
.log{background:#1a1a2e;border-radius:6px;padding:6px;font-size:10px;font-family:monospace;color:#c9d1d9;height:100px;overflow-y:auto}
.canvas-wrap{background:#fff;border:1px solid #e5e5e5;border-radius:10px;overflow:hidden;position:relative}
canvas{display:block;width:100%;height:100%;cursor:grab}
.right-panel{display:flex;flex-direction:column;gap:7px;overflow-y:auto}
.editor-area{flex:1;background:#1a1a2e;border-radius:6px;padding:8px;font-family:monospace;font-size:10px;color:#c9d1d9;border:1px solid #3a3a5c;outline:none;resize:none;min-height:150px}
</style>
</head>
<body>
<div class="topbar">
  <div style="display:flex;align-items:center;gap:6px">
    <span class="logo-name">3D Graph Visualizer</span>
    <span class="logo-sub">C++ · Resizeable Sidebar</span>
  </div>
  <div style="display:flex;gap:5px">
    <a href="g_algo_refrence.html" style="text-decoration:none"><span class="tb-pill" style="cursor:pointer;color:#79c0ff;border-color:#185FA5">Reference →</span></a>
  </div>
</div>

<div class="main">
  <div class="sidebar" id="sidebar">
    <div class="card">
      <div class="ct">Graph Builder</div>
      <div class="sl">Manage Node</div>
      <div class="row">
        <input type="text" id="nl" placeholder="Label (A, 1)"/>
        <button class="btn p sm" onclick="addNode()">+Node</button>
        <button class="btn d sm" onclick="removeNode()">-Node</button>
      </div>
      <div class="sl">Manage Edge</div>
      <div class="row">
        <select id="ef"></select> → <select id="et"></select>
      </div>
      <div class="row">
        <input type="number" id="ew" value="1"/>
        <label style="font-size:9px"><input type="checkbox" id="dir" checked/> Dir</label>
        <button class="btn p sm" onclick="addEdge()">+Edge</button>
        <button class="btn d sm" onclick="removeEdge()">-Edge</button>
      </div>
      <button class="btn d sm" style="width:100%; margin-top:5px" onclick="clearGraph()">Clear All</button>
    </div>

    <div class="card">
      <div class="ct">Algorithms</div>
      <div class="algo-grid">
        <div class="ab" id="ab-bfs" onclick="selAlgo('bfs')">BFS</div>
        <div class="ab" id="ab-dfs" onclick="selAlgo('dfs')">DFS</div>
        <div class="ab" id="ab-dijkstra" onclick="selAlgo('dijkstra')">Dijkstra</div>
        <div class="ab" id="ab-kruskal" onclick="selAlgo('kruskal')">Kruskal</div>
      </div>
    </div>

    <div class="card">
      <div class="ct">Run & Control</div>
      <div class="row"><select id="sn" style="flex:1"></select><button class="btn p" onclick="runAlgo()">Run</button></div>
      <div class="row" style="margin-top:5px">
        <input type="range" min="200" max="2000" value="800" id="spd" style="flex:1"/>
      </div>
    </div>

    <div class="card" style="flex:1">
      <div class="ct">Step Log</div>
      <div class="log" id="logbox"></div>
    </div>
  </div>

  <div class="canvas-wrap">
    <canvas id="gc"></canvas>
    <div style="position:absolute; bottom:10px; left:10px; font-size:10px; color:#888">Resize left sidebar from edge ↔</div>
  </div>

  <div class="right-panel">
    <div class="card editor-wrap" style="height:100%; display:flex; flex-direction:column">
      <div class="ct">Live Code Editor</div>
      <textarea class="editor-area" id="editor" placeholder="addedge A B 1 0"></textarea>
      <div class="row" style="margin-top:5px">
        <button class="btn p sm" onclick="parseEditor()">Build Graph</button>
        <button class="btn sm" onclick="clearEditor()">Clear</button>
      </div>
    </div>
  </div>
</div>

<script>
const canvas=document.getElementById('gc'), ctx=canvas.getContext('2d');
let nodes=[], edges=[], nid=0, rotX=0.3, rotY=0.4, zoom=1, drag=false, lmx=0, lmy=0;
let algo=null, tmr=null, NC={}, EC={}, NL={};
const C={node:'#185FA5', vis:'#1D9E75', curr:'#E24B4A', edge:'#D0D0D0', trav:'#185FA5', mst:'#F2CC60'};

function resizeCanvas(){ canvas.width=canvas.parentElement.clientWidth; canvas.height=canvas.parentElement.clientHeight; draw(); }
function project(x,y,z){
  const cx=Math.cos(rotX), sx=Math.sin(rotX), cy=Math.cos(rotY), sy=Math.sin(rotY);
  const nx=x*cy+z*sy, ny=x*sx*sy+y*cx-z*sx*cy;
  const s=zoom*Math.min(canvas.width,canvas.height)*0.24;
  return {px:canvas.width/2+nx*s, py:canvas.height/2-ny*s};
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const dir=document.getElementById('dir').checked;
  edges.forEach(e=>{
    const n1=nodes.find(n=>n.id===e.f), n2=nodes.find(n=>n.id===e.t);
    if(!n1 || !n2) return;
    const p1=project(n1.x,n1.y,n1.z), p2=project(n2.x,n2.y,n2.z);
    const key=`${e.f}-${e.t}`, rkey=`${e.t}-${e.f}`;
    const col=EC[key] || (!dir && EC[rkey]) || C.edge;
    ctx.beginPath(); ctx.moveTo(p1.px, p1.py); ctx.lineTo(p2.px, p2.py);
    ctx.strokeStyle=col; ctx.lineWidth=(col===C.edge?1:2.5); ctx.stroke();
  });
  nodes.forEach(n=>{
    const p=project(n.x,n.y,n.z), col=NC[n.id]||C.node;
    ctx.beginPath(); ctx.arc(p.px,p.py,20,0,Math.PI*2); ctx.fillStyle="#fff"; ctx.fill();
    ctx.strokeStyle=col; ctx.lineWidth=2.5; ctx.stroke();
    ctx.fillStyle=col; ctx.textAlign='center'; ctx.fillText(n.label,p.px,p.py+4);
  });
}

function addNode(){
  const label=document.getElementById('nl').value.trim()||String.fromCharCode(65+nodes.length);
  nodes.push({id:nid++, label, x:(Math.random()-0.5)*4, y:(Math.random()-0.5)*4, z:(Math.random()-0.5)*4});
  updSel(); draw();
}

function removeNode(){
  const label=document.getElementById('nl').value.trim();
  const idx=nodes.findIndex(n=>n.label===label);
  if(idx!==-1){
    const id=nodes[idx].id;
    nodes.splice(idx,1);
    edges=edges.filter(e=>e.f!==id && e.t!==id);
    updSel(); draw();
  }
}

function addEdge(){
  const f=parseInt(document.getElementById('ef').value), t=parseInt(document.getElementById('et').value), w=parseInt(document.getElementById('ew').value);
  if(!isNaN(f) && !isNaN(t)) { edges.push({f,t,w}); draw(); }
}

function removeEdge(){
  const f=parseInt(document.getElementById('ef').value), t=parseInt(document.getElementById('et').value);
  edges=edges.filter(e=>!(e.f===f && e.t===t));
  draw();
}

function updSel(){
  const picks=['ef','et','sn'];
  picks.forEach(p=>{
    const s=document.getElementById(p);
    s.innerHTML=nodes.map(n=>`<option value="${n.id}">${n.label}</option>`).join('');
  });
}

function clearGraph(){ nodes=[]; edges=[]; nid=0; draw(); }

function parseEditor(){
  const text=document.getElementById('editor').value;
  clearGraph();
  text.split('\n').forEach(line=>{
    const p=line.trim().split(/\s+/);
    if(p[0]==='addedge' && p.length>=4){
      const uL=p[1], vL=p[2], w=parseInt(p[3]), d=parseInt(p[4]);
      [uL,vL].forEach(l=>{ if(!nodes.find(n=>n.label===l)) nodes.push({id:nid++, label:l, x:(Math.random()-0.5)*4, y:(Math.random()-0.5)*4, z:(Math.random()-0.5)*4}); });
      const u=nodes.find(n=>n.label===uL), v=nodes.find(n=>n.label===vL);
      edges.push({f:u.id, t:v.id, w});
      if(d===0) edges.push({f:v.id, t:u.id, w});
    }
  });
  updSel(); draw();
}

// Mouse events for rotation
canvas.addEventListener('mousedown',e=>{drag=true;lmx=e.clientX;lmy=e.clientY;});
window.addEventListener('mousemove',e=>{if(!drag)return;rotY+=(e.clientX-lmx)*0.01;rotX+=(e.clientY-lmy)*0.01;lmx=e.clientX;lmy=e.clientY;draw();});
window.addEventListener('mouseup',()=>drag=false);

function selAlgo(name){ algo=name; document.querySelectorAll('.ab').forEach(b=>b.classList.remove('active')); document.getElementById('ab-'+name).classList.add('active'); }
function log(m){ const b=document.getElementById('logbox'); const d=document.createElement('div'); d.textContent=m; b.prepend(d); }

window.addEventListener('resize',resizeCanvas);
resizeCanvas();
</script>
</body>
</html>
