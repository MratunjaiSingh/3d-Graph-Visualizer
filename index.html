<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>3D Graph Visualizer — Pro Version</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;color:#1a1a1a;height:100vh;overflow:hidden}
.topbar{background:#1a1a2e;padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:42px;color:white}
.main{display:flex;height:calc(100vh - 42px);padding:8px;gap:8px}
/* Sidebar Fix: Fixed range for resizing */
.sidebar{width:280px; min-width:240px; max-width:450px; resize:horizontal; overflow:auto; background:#fff; border-radius:10px; border:1px solid #e5e5e5; display:flex; flex-direction:column; padding:4px}
.canvas-wrap{flex:1; background:#fff; border-radius:10px; border:1px solid #e5e5e5; position:relative; overflow:hidden}
canvas{display:block; width:100%; height:100%; cursor:grab}
.right-panel{width:280px; display:flex; flex-direction:column; gap:8px}
.card{background:#fff; padding:12px; border-bottom:1px solid #f0f0f0; border-radius:8px}
.ct{font-size:11px; font-weight:600; margin-bottom:8px}
.row{display:flex; gap:5px; margin-bottom:6px; align-items:center}
input, select{padding:5px; border-radius:5px; border:1px solid #ddd; font-size:11px; outline:none}
input[type=text]{flex:1}
.btn{padding:5px 10px; border-radius:5px; font-size:10px; font-weight:600; cursor:pointer; border:none; transition:0.2s}
.btn.p{background:#185FA5; color:#fff}
.btn.d{background:#a32d2d; color:#fff}
.algo-grid{display:grid; grid-template-columns:1fr 1fr; gap:4px}
.ab{padding:6px; border-radius:5px; font-size:10px; border:1px solid #ddd; text-align:center; cursor:pointer}
.ab.active{background:#185FA5; color:white}
.log{background:#1a1a2e; color:#c9d1d9; padding:8px; border-radius:6px; font-family:monospace; font-size:10px; height:120px; overflow-y:auto}
.editor-area{flex:1; background:#1a1a2e; color:white; padding:8px; font-family:monospace; border-radius:6px; font-size:10px; resize:none}
</style>
</head>
<body>

<div class="topbar">
    <span style="font-weight:600">3D Graph Visualizer | C++ Algorithm Explorer</span>
    <a href="g_algo_reference.html" style="color:#79c0ff; font-size:11px">Reference →</a>
</div>

<div class="main">
    <div class="sidebar" id="sidebar">
        <div class="card">
            <div class="ct">Graph Builder</div>
            <div class="row">
                <input type="text" id="nl" placeholder="Node label (A, B, 1)"/>
                <button class="btn p" onclick="addNode()">+Node</button>
                <button class="btn d" onclick="removeNode()">-Node</button>
            </div>
            <div class="row">
                <select id="ef" style="flex:1"></select> → <select id="et" style="flex:1"></select>
            </div>
            <div class="row">
                <input type="number" id="ew" value="1" style="width:50px"/>
                <label style="font-size:10px"><input type="checkbox" id="dir" checked/> Directed</label>
                <button class="btn p" onclick="addEdge()">+Edge</button>
                <button class="btn d" onclick="removeEdge()">-Edge</button>
            </div>
            <button class="btn d" style="width:100%" onclick="clearGraph()">Clear All</button>
        </div>

        <div class="card">
            <div class="ct">Algorithms</div>
            <div class="algo-grid">
                <div class="ab" id="ab-bfs" onclick="selAlgo('bfs')">BFS</div>
                <div class="ab" id="ab-dfs" onclick="selAlgo('dfs')">DFS</div>
                <div class="ab" id="ab-dijkstra" onclick="selAlgo('dijkstra')">Dijkstra</div>
                <div class="ab" id="ab-kruskal" onclick="selAlgo('kruskal')">Kruskal</div>
            </div>
        </div>

        <div class="card">
            <div class="ct">Execution</div>
            <div class="row">
                <select id="sn" style="flex:1"></select>
                <button class="btn p" onclick="runAlgo()">Run</button>
            </div>
            <div style="font-size:10px; margin-top:5px">Speed: <input type="range" min="100" max="2000" value="800" id="spd"/></div>
        </div>

        <div class="card" style="flex:1">
            <div class="ct">Step Log</div>
            <div class="log" id="logbox"></div>
        </div>
    </div>

    <div class="canvas-wrap">
        <canvas id="gc"></canvas>
    </div>

    <div class="right-panel">
        <div class="card" style="flex:1; display:flex; flex-direction:column">
            <div class="ct">Live Code Editor</div>
            <textarea class="editor-area" id="editor" placeholder="addedge A B 1 0"></textarea>
            <div class="row" style="margin-top:8px">
                <button class="btn p" style="flex:1" onclick="parseEditor()">Build Graph</button>
                <button class="btn d" onclick="document.getElementById('editor').value=''">Clear</button>
            </div>
        </div>
    </div>
</div>

<script>
const canvas=document.getElementById('gc'), ctx=canvas.getContext('2d');
let nodes=[], edges=[], nid=0, rotX=0.3, rotY=0.4, zoom=1, drag=false, lmx=0, lmy=0;
let algo=null, tmr=null, NC={}, EC={};

const COLORS = { node: '#185FA5', vis: '#1D9E75', curr: '#E24B4A', edge: '#D0D0D0', mst: '#F2CC60' };

function resizeCanvas(){ 
    canvas.width=canvas.parentElement.clientWidth; 
    canvas.height=canvas.parentElement.clientHeight; 
    draw(); 
}

function project(x,y,z){
    const cx=Math.cos(rotX), sx=Math.sin(rotX), cy=Math.cos(rotY), sy=Math.sin(rotY);
    const nx=x*cy+z*sy, ny=x*sx*sy+y*cx-z*sx*cy;
    const s=zoom*Math.min(canvas.width,canvas.height)*0.25;
    return {px:canvas.width/2+nx*s, py:canvas.height/2-ny*s};
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    const dir=document.getElementById('dir').checked;
    edges.forEach(e=>{
        const n1=nodes.find(n=>n.id===e.f), n2=nodes.find(n=>n.id===e.t);
        if(!n1 || !n2) return;
        const p1=project(n1.x,n1.y,n1.z), p2=project(n2.x,n2.y,n2.z);
        const col = EC[`${e.f}-${e.t}`] || (!dir && EC[`${e.t}-${e.f}`]) || COLORS.edge;
        ctx.beginPath(); ctx.moveTo(p1.px, p1.py); ctx.lineTo(p2.px, p2.py);
        ctx.strokeStyle=col; ctx.lineWidth=(col===COLORS.edge?1.2:3); ctx.stroke();
    });
    nodes.forEach(n=>{
        const p=project(n.x,n.y,n.z), col=NC[n.id]||COLORS.node;
        ctx.beginPath(); ctx.arc(p.px,p.py,18,0,Math.PI*2); ctx.fillStyle="#fff"; ctx.fill();
        ctx.strokeStyle=col; ctx.lineWidth=2.5; ctx.stroke();
        ctx.fillStyle=col; ctx.font='bold 11px sans-serif'; ctx.textAlign='center'; ctx.fillText(n.label,p.px,p.py+4);
    });
}

function addNode(){
    const label=document.getElementById('nl').value.trim()||String.fromCharCode(65+nodes.length);
    if(nodes.find(n=>n.label===label)) return;
    nodes.push({id:nid++, label, x:(Math.random()-0.5)*4, y:(Math.random()-0.5)*4, z:(Math.random()-0.5)*4});
    updSel(); draw();
}

function removeNode(){
    const label=document.getElementById('nl').value.trim();
    const idx=nodes.findIndex(n=>n.label===label);
    if(idx!==-1){
        const id=nodes[idx].id;
        nodes.splice(idx,1);
        edges=edges.filter(e=>e.f!==id && e.t!==id);
        updSel(); draw();
    }
}

function addEdge(){
    const f=parseInt(document.getElementById('ef').value), t=parseInt(document.getElementById('et').value), w=parseInt(document.getElementById('ew').value);
    if(isNaN(f) || isNaN(t) || f===t) return;
    edges.push({f,t,w}); draw();
}

function removeEdge(){
    const f=parseInt(document.getElementById('ef').value), t=parseInt(document.getElementById('et').value);
    edges=edges.filter(e=>!(e.f===f && e.t===t));
    draw();
}

function updSel(){
    ['ef','et','sn'].forEach(p=>{
        const s=document.getElementById(p);
        s.innerHTML=nodes.map(n=>`<option value="${n.id}">${n.label}</option>`).join('');
    });
}

function clearGraph(){ nodes=[]; edges=[]; nid=0; draw(); document.getElementById('logbox').innerHTML=''; }

function parseEditor(){
    const text=document.getElementById('editor').value;
    clearGraph();
    text.split('\n').forEach(line=>{
        const p=line.trim().split(/\s+/);
        if(p[0]==='addedge' && p.length>=4){
            const uL=p[1], vL=p[2], w=parseInt(p[3]), d=parseInt(p[4]);
            [uL,vL].forEach(l=>{ if(!nodes.find(n=>n.label===l)) nodes.push({id:nid++, label:l, x:(Math.random()-0.5)*4, y:(Math.random()-0.5)*4, z:(Math.random()-0.5)*4}); });
            const u=nodes.find(n=>n.label===uL), v=nodes.find(n=>n.label===vL);
            edges.push({f:u.id, t:v.id, w});
            if(d===0) edges.push({f:v.id, t:u.id, w});
        }
    });
    updSel(); draw();
}

canvas.addEventListener('mousedown',e=>{drag=true;lmx=e.clientX;lmy=e.clientY;});
window.addEventListener('mousemove',e=>{if(!drag)return;rotY+=(e.clientX-lmx)*0.01;rotX+=(e.clientY-lmy)*0.01;lmx=e.clientX;lmy=e.clientY;draw();});
window.addEventListener('mouseup',()=>drag=false);
function selAlgo(n){ algo=n; document.querySelectorAll('.ab').forEach(b=>b.classList.remove('active')); document.getElementById('ab-'+n).classList.add('active'); }
function runAlgo(){ if(!algo) alert('Select Algorithm'); else log("Running "+algo+"..."); }
function log(m){ const b=document.getElementById('logbox'); const d=document.createElement('div'); d.textContent=m; b.prepend(d); }

new ResizeObserver(resizeCanvas).observe(document.querySelector('.canvas-wrap'));
window.addEventListener('load', resizeCanvas);
</script>
</body>
</html>
