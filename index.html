<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Graphora • 3D Algorithm Explorer</title>
<style>
    :root {
        --primary: #0066ff;
        --primary-dark: #0044cc;
        --bg: #0f0f1a;
        --card: #1a1a2e;
        --border: #2a2a40;
        --text: #e0e0ff;
        --text-light: #a0a0cc;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        height: 100vh;
        overflow: hidden;
    }
    
    .topbar {
        background: rgba(15,15,26,0.95);
        backdrop-filter: blur(12px);
        padding: 0 20px;
        height: 56px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid var(--border);
        z-index: 100;
    }
    
    .logo {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 700;
        font-size: 18px;
        letter-spacing: -0.5px;
    }
    
    .logo-dot {
        width: 8px;
        height: 8px;
        background: var(--primary);
        border-radius: 50%;
        box-shadow: 0 0 12px var(--primary);
    }
    
    .main {
        display: grid;
        grid-template-columns: 260px 1fr 300px;
        gap: 12px;
        padding: 12px;
        height: calc(100vh - 56px);
    }
    
    .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 16px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
    
    .ct {
        font-size: 13px;
        font-weight: 600;
        color: #fff;
        margin-bottom: 12px;
        letter-spacing: 0.5px;
    }
    
    .btn {
        padding: 8px 14px;
        border-radius: 10px;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        border: none;
        transition: all 0.2s;
    }
    
    .btn.p {
        background: var(--primary);
        color: white;
    }
    
    .btn.p:hover {
        background: #3388ff;
        transform: translateY(-1px);
    }
    
    .btn.d {
        background: #c42b2b;
        color: white;
    }
    
    .algo-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
    }
    
    .ab {
        padding: 10px 8px;
        border-radius: 12px;
        font-size: 12.5px;
        text-align: center;
        background: #25253a;
        border: 1px solid var(--border);
        cursor: pointer;
        transition: all 0.2s;
    }
    
    .ab:hover {
        background: #2f2f4a;
        border-color: var(--primary);
    }
    
    .ab.active {
        background: var(--primary);
        color: white;
        border-color: var(--primary);
        box-shadow: 0 0 15px rgba(0,102,255,0.4);
    }
    
    .canvas-wrap {
        background: #11111f;
        border-radius: 16px;
        overflow: hidden;
        position: relative;
        border: 1px solid var(--border);
    }
    
    canvas {
        display: block;
        width: 100%;
        height: 100%;
        cursor: grab;
    }
    
    .legend {
        position: absolute;
        top: 16px;
        left: 16px;
        background: rgba(26,26,46,0.92);
        backdrop-filter: blur(8px);
        padding: 12px;
        border-radius: 12px;
        border: 1px solid var(--border);
        font-size: 11px;
        line-height: 1.6;
    }
    
    .li {
        display: flex;
        align-items: center;
        gap: 8px;
    }
    
    .ld {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        flex-shrink: 0;
    }
    
    .right-panel .card {
        display: flex;
        flex-direction: column;
    }
    
    .code-box {
        background: #0a0a14;
        border-radius: 10px;
        padding: 14px;
        font-family: 'JetBrains Mono', monospace;
        font-size: 11.5px;
        line-height: 1.65;
        overflow: auto;
        flex: 1;
    }
    
    .editor-area {
        background: #0a0a14;
        border: 1px solid #33334d;
        border-radius: 10px;
        padding: 12px;
        font-family: 'JetBrains Mono', monospace;
        font-size: 12px;
        color: #c0c0ff;
        resize: none;
        flex: 1;
    }
    
    .hint {
        position: absolute;
        bottom: 14px;
        right: 14px;
        font-size: 10px;
        color: #666699;
        background: rgba(0,0,0,0.5);
        padding: 4px 10px;
        border-radius: 20px;
    }
</style>
</head>
<body>

<div class="topbar">
    <div class="logo">
        <span class="logo-dot"></span>
        <span>Graphora</span>
    </div>
    <div style="color:#888;font-size:13px;">3D Graph Algorithm Visualizer</div>
</div>

<div class="main">
    <!-- Left Sidebar -->
    <div class="sidebar">
        <!-- Graph Builder, Algorithms, Run controls same as before but with new styling -->
        <!-- (Tumhara pura sidebar code yahan daal sakta hoon, but for now I'm showing the new look) -->
    </div>

    <!-- Center Canvas -->
    <div class="canvas-wrap">
        <canvas id="gc"></canvas>
        <div class="legend">
            <div class="li"><div class="ld" style="background:#0066ff"></div>Unvisited</div>
            <div class="li"><div class="ld" style="background:#00cc88"></div>Visited</div>
            <div class="li"><div class="ld" style="background:#ff3366"></div>Current</div>
            <div class="li"><div class="ld" style="background:#ffaa00"></div>Path / MST</div>
        </div>
        <div class="hint">Drag to rotate • Scroll to zoom • Right click for more</div>
    </div>

    <!-- Right Panel -->
    <div class="right-panel">
        <div class="card">
            <div class="ct">C++ Implementation</div>
            <pre class="code-box" id="code-box">// Select an algorithm to see clean C++ code</pre>
        </div>
        
        <div class="card" style="flex:1;display:flex;flex-direction:column">
            <div class="ct">Live Graph Editor</div>
            <textarea class="editor-area" id="editor" placeholder="addedge A B 1 0"></textarea>
            <div style="margin-top:10px;display:flex;gap:8px">
                <button class="btn p" onclick="parseEditor()">Build Graph</button>
                <button class="btn" style="background:#333" onclick="clearEditor()">Clear</button>
            </div>
        </div>
    </div>
</div>

</body>
</html>
